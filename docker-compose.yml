version: '3.8'

services:
  # Backend - FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aicompanion-backend
    restart: unless-stopped
    environment:
      # Security
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=10080
      
      # Database
      - DATABASE_URL=sqlite+aiosqlite:///./aicompanion.db
      
      # Vector DB
      - VECTOR_DB_TYPE=chroma
      - CHROMA_DB_PATH=./vector_db
      
      # LLM Configuration
      - LLM_PROVIDER=${LLM_PROVIDER:-hybrid}
      
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4-turbo-preview}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      
      # Anthropic
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-3-sonnet-20240229}
      
      # Ollama (si usas local)
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama2}
      
      # Image Generation
      - IMAGE_PROVIDER=${IMAGE_PROVIDER:-replicate}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN:-}
      - STABILITY_API_KEY=${STABILITY_API_KEY:-}
      
      # TTS
      - TTS_PROVIDER=${TTS_PROVIDER:-edge}
      - TTS_DEFAULT_VOICE=${TTS_DEFAULT_VOICE:-en-US-AriaNeural}
      
      # API Settings
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEBUG=${DEBUG:-false}
    volumes:
      # Persistencia de datos
      - backend_data:/app
      - ./backend/assets:/app/assets
      - ./backend/vector_db:/app/vector_db
      - ./backend/logs:/app/logs
    networks:
      - aicompanion-network
    extra_hosts:
      # Para acceder a servicios locales (Ollama)
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend - React + Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aicompanion-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - aicompanion-network

networks:
  aicompanion-network:
    driver: bridge

volumes:
  backend_data:
    driver: local
